name: Tests Unitarios Android

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m"

jobs:
  test:
    name: Ejecutar Tests Unitarios
    runs-on: ubuntu-latest
    
    timeout-minutes: 30  # ⏱️ Timeout para evitar builds colgados

    steps:
    # =============================================================================
    # 1. CHECKOUT - Versión Node.js 24
    # =============================================================================
    - name: 📥 Checkout del código
      uses: actions/checkout@v5  # ✅ Node.js 24 nativo
      with:
        fetch-depth: 0  # Para mejor historial en reports

    # =============================================================================
    # 2. SETUP JAVA - Versión Node.js 24
    # =============================================================================
    - name: ☕ Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'  # ✅ Cache automático de Gradle

    # =============================================================================
    # 3. CACHE GRADLE - Versión Node.js 24
    # =============================================================================
    - name: 💾 Cache de Gradle
      uses: actions/cache@v5  # ✅ Node.js 24 nativo
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          **/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # =============================================================================
    # 3b. CONFIGURAR CREDENCIALES SUPABASE
    # =============================================================================
    - name: 🔐 Configurar Supabase Credentials
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║        CONFIGURANDO CREDENCIALES DE SUPABASE           ║"
        echo "╚════════════════════════════════════════════════════════╝"
        cat > gradle.properties << EOF
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.suppressUnsupportedCompileSdk=36
SUPABASE_URL=${{ secrets.SUPABASE_URL }}
SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
EOF
        echo "✅ gradle.properties configurado con credenciales de Supabase"

    # =============================================================================
    # 4. DIAGNÓSTICO DEL PROYECTO
    # =============================================================================
    - name: 🔍 Diagnóstico del Proyecto Android
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║         DIAGNÓSTICO DEL PROYECTO ANDROID               ║"
        echo "╚════════════════════════════════════════════════════════╝"
        
        echo -e "\n📱 Versión de Gradle:"
        ./gradlew --version
        
        echo -e "\n📂 Estructura del proyecto:"
        ls -la
        
        echo -e "\n📋 Tasks de test disponibles:"
        ./gradlew tasks --all 2>&1 | grep -i test | head -40
        
        echo -e "\n🔎 Buscando variantes de build:"
        ./gradlew tasks 2>&1 | grep -E "(Debug|Release|UnitTest)" | head -20
        
        echo -e "\n📄 Verificando build.gradle de app:"
        if [ -f "app/build.gradle" ]; then
          echo "✅ app/build.gradle encontrado"
          grep -A 10 "testOptions" app/build.gradle || echo "⚠️ testOptions no configurado"
        elif [ -f "app/build.gradle.kts" ]; then
          echo "✅ app/build.gradle.kts encontrado"
          grep -A 10 "testOptions" app/build.gradle.kts || echo "⚠️ testOptions no configurado"
        else
          echo "❌ No se encontró build.gradle de app"
        fi

    # =============================================================================
    # 5. EJECUCIÓN DE TESTS CON LOGGING EXTENDIDO
    # =============================================================================
    - name: 🧪 Ejecutar Tests Unitarios
      id: tests
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║              EJECUTANDO TESTS UNITARIOS                ║"
        echo "╚════════════════════════════════════════════════════════╝"
        
        # Crear directorio de logs
        mkdir -p test-logs
        
        # Función para ejecutar tests con logging
        run_tests() {
          local task=$1
          echo -e "\n🔹 Ejecutando: $task"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if ./gradlew $task \
            --no-daemon \
            --console=plain \
            --warning-mode all \
            --stacktrace \
            --info \
            2>&1 | tee "test-logs/${task//\//_}.log"; then
            echo "✅ $task completado exitosamente"
            return 0
          else
            echo "❌ $task falló"
            return 1
          fi
        }
        
        # Detectar qué tasks de test existen
        echo -e "\n🔎 Detectando tasks de test disponibles..."
        
        TEST_TASKS=()
        
        if ./gradlew tasks 2>&1 | grep -q "testDebugUnitTest"; then
          TEST_TASKS+=("testDebugUnitTest")
          echo "✅ Encontrado: testDebugUnitTest"
        fi
        
        if ./gradlew tasks 2>&1 | grep -q "testReleaseUnitTest"; then
          TEST_TASKS+=("testReleaseUnitTest")
          echo "✅ Encontrado: testReleaseUnitTest"
        fi
        
        if ./gradlew tasks 2>&1 | grep -q "test[^A-Z]"; then
          TEST_TASKS+=("test")
          echo "✅ Encontrado: test (genérico)"
        fi
        
        if [ ${#TEST_TASKS[@]} -eq 0 ]; then
          echo "❌ No se encontraron tasks de test"
          exit 1
        fi
        
        # Ejecutar todos los tasks encontrados
        FAILED=0
        for task in "${TEST_TASKS[@]}"; do
          if ! run_tests "$task"; then
            FAILED=1
          fi
        done
        
        # Guardar estado
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        
        # Resumen final
        echo -e "\n╔════════════════════════════════════════════════════════╗"
        echo "║                    RESUMEN DE TESTS                        ║"
        echo "╚════════════════════════════════════════════════════════╝"
        echo "Tasks ejecutados: ${TEST_TASKS[*]}"
        echo "Estado: $([ $FAILED -eq 0 ] && echo '✅ TODOS PASARON' || echo '❌ ALGUNOS FALLARON')"

    # =============================================================================
    # 6. DIAGNÓSTICO DE REPORTES GENERADOS
    # =============================================================================
    - name: 📊 Diagnóstico de Reportes Generados
      if: always()
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║        DIAGNÓSTICO DE REPORTES DE TESTS                ║"
        echo "╚════════════════════════════════════════════════════════╝"
        
        echo -e "\n📂 Buscando archivos XML de test results:"
        find . -name "TEST-*.xml" -type f 2>/dev/null | tee /tmp/test-xml-files.txt
        
        TOTAL_XML=$(wc -l < /tmp/test-xml-files.txt 2>/dev/null || echo "0")
        echo -e "\n📈 Total de archivos XML encontrados: $TOTAL_XML"
        
        echo -e "\n📂 Estructura de app/build/test-results/:"
        if [ -d "app/build/test-results" ]; then
          ls -laR app/build/test-results/ 2>/dev/null | head -60
        else
          echo "❌ app/build/test-results/ NO existe"
        fi
        
        echo -e "\n📂 Estructura de app/build/reports/tests/:"
        if [ -d "app/build/reports/tests" ]; then
          ls -laR app/build/reports/tests/ 2>/dev/null | head -60
        else
          echo "❌ app/build/reports/tests/ NO existe"
        fi
        
        echo -e "\n📂 Estructura de build/test-results/:"
        if [ -d "build/test-results" ]; then
          ls -laR build/test-results/ 2>/dev/null | head -60
        else
          echo "❌ build/test-results/ NO existe"
        fi
        
        echo -e "\n📂 Estructura de build/reports/tests/:"
        if [ -d "build/reports/tests" ]; then
          ls -laR build/reports/tests/ 2>/dev/null | head -60
        else
          echo "❌ build/reports/tests/ NO existe"
        fi

    # =============================================================================
    # 7. PUBLICAR RESULTADOS EN GITHUB (PR Check)
    # =============================================================================
    - name: 📈 Publicar Resultados de Tests
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2.22.0  # ✅ Última versión
      with:
        files: |
          app/build/test-results/**/*.xml
          build/test-results/**/*.xml
          **/test-results/**/*.xml
        check_name: Test Results
        comment_mode: always
        fail_on: test failures
        ignore_runs: false
        report_individual_runs: true
        deduplicate_classes_by_file_name: true

    # =============================================================================
    # 8. SUBIR ARTIFACTS - HTML Reports
    # =============================================================================
    - name: 📦 Subir Reporte HTML de Tests
      if: always()
      uses: actions/upload-artifact@v6  # ✅ Node.js 24 nativo
      with:
        name: test-reports-html-${{ github.run_id }}
        path: |
          app/build/reports/tests/**
          build/reports/tests/**
        retention-days: 14
        if-no-files-found: warn
        compression-level: 6

    # =============================================================================
    # 9. SUBIR ARTIFACTS - XML Test Results
    # =============================================================================
    - name: 📦 Subir Resultados XML de Tests
      if: always()
      uses: actions/upload-artifact@v6  # ✅ Node.js 24 nativo
      with:
        name: test-results-xml-${{ github.run_id }}
        path: |
          app/build/test-results/**/*.xml
          build/test-results/**/*.xml
          **/test-results/**/*.xml
        retention-days: 14
        if-no-files-found: warn
        compression-level: 6

    # =============================================================================
    # 10. SUBIR ARTIFACTS - Logs Completos
    # =============================================================================
    - name: 📦 Subir Logs Completos de Ejecución
      if: always()
      uses: actions/upload-artifact@v6  # ✅ Node.js 24 nativo
      with:
        name: test-logs-complete-${{ github.run_id }}
        path: |
          test-logs/*.log
          *.log
        retention-days: 14
        if-no-files-found: warn
        compression-level: 6

    # =============================================================================
    # 11. RESUMEN FINAL DEL WORKFLOW
    # =============================================================================
    - name: 📝 Resumen Final del Workflow
      if: always()
      run: |
        echo "╔════════════════════════════════════════════════════════╗"
        echo "║              RESUMEN FINAL DEL WORKFLOW                ║"
        echo "╚════════════════════════════════════════════════════════╝"
        
        echo -e "\n📊 Estado de los tests: ${{ steps.tests.outputs.failed == '0' && '✅ PASARON' || '❌ FALLARON' }}"
        echo -e "\n📦 Artifacts generados:"
        echo "   - Reportes HTML"
        echo "   - Resultados XML"
        echo "   - Logs completos"
        
        echo -e "\n🔗 Para ver los detalles:"
        echo "   1. Revisa la sección 'Annotations' arriba"
        echo "   2. Descarga los artifacts de la sección 'Artifacts'"
        echo "   3. Revisa el check 'Test Results' en el PR"
        
        if [ "${{ steps.tests.outputs.failed }}" == "1" ]; then
          echo -e "\n❌ EL WORKFLOW FALLÓ - Revisa los logs para más detalles"
          exit 1
        else
          echo -e "\n✅ EL WORKFLOW COMPLETÓ EXITOSAMENTE"
        fi
